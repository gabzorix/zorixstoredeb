<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Galactic gradient background -->
    <radialGradient id="spaceGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Cosmic Z gradient -->
    <linearGradient id="cosmicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64c8ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9d4edd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f0047;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Intense glow effect -->
    <filter id="intenseglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background space -->
  <rect width="200" height="200" fill="url(#spaceGradient)"/>
  
  <!-- Cosmic particles/stars -->
  <circle cx="30" cy="40" r="1.5" fill="#64c8ff" opacity="0.6"/>
  <circle cx="170" cy="50" r="1" fill="#9d4edd" opacity="0.5"/>
  <circle cx="160" cy="140" r="1.2" fill="#64c8ff" opacity="0.7"/>
  <circle cx="40" cy="160" r="1" fill="#9d4edd" opacity="0.6"/>
  <circle cx="100" cy="30" r="0.8" fill="#64c8ff" opacity="0.4"/>
  <circle cx="20" cy="100" r="1.3" fill="#9d4edd" opacity="0.5"/>
  <circle cx="180" cy="170" r="1" fill="#64c8ff" opacity="0.6"/>
  <circle cx="150" cy="70" r="0.9" fill="#9d4edd" opacity="0.4"/>
  
  <!-- Cosmic dust cloud effect -->
  <ellipse cx="100" cy="100" rx="80" ry="70" fill="url(#cosmicGradient)" opacity="0.15"/>
  
  <!-- Outer cosmic ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#64c8ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#9d4edd" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Main Z shape with glow -->
  <g filter="url(#intenseglow)">
    <path d="M 60 50 L 140 50 L 60 140 L 140 140" 
          fill="none" 
          stroke="url(#cosmicGradient)" 
          stroke-width="18" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.8"/>
  </g>
  
  <!-- Main Z shape primary -->
  <path d="M 60 50 L 140 50 L 60 140 L 140 140" 
        fill="none" 
        stroke="url(#cosmicGradient)" 
        stroke-width="14" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Highlights on Z -->
  <path d="M 60 50 L 140 50" 
        fill="none" 
        stroke="#64c8ff" 
        stroke-width="3" 
        stroke-linecap="round" 
        opacity="0.6"/>
  <path d="M 60 140 L 140 140" 
        fill="none" 
        stroke="#64c8ff" 
        stroke-width="3" 
        stroke-linecap="round" 
        opacity="0.6"/>
  
  <!-- Inner decorative lines -->
  <line x1="65" y1="55" x2="135" y2="145" stroke="#9d4edd" stroke-width="1.5" opacity="0.4"/>
  <line x1="135" y1="55" x2="65" y2="145" stroke="#9d4edd" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Cosmic corner stars -->
  <g opacity="0.7">
    <circle cx="50" cy="40" r="2" fill="#64c8ff"/>
    <circle cx="150" cy="50" r="2" fill="#9d4edd"/>
    <circle cx="40" cy="150" r="1.5" fill="#64c8ff"/>
    <circle cx="160" cy="160" r="1.5" fill="#9d4edd"/>
  </g>
  
  <!-- Pulsing outer aura -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#64c8ff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#9d4edd" stroke-width="0.5" opacity="0.2"/>
</svg>
